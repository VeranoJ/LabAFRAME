<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Banda Transportadora Industrial - A-Frame</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #ECECEC">
      
      <!-- Soportes de la banda transportadora -->
      <a-entity id="estructuraSoportes" position="0 0 0">
      
        <a-box position="-6 1.25 2" 
               width="2" height="2.5" depth="1" 
               color="#b0abaf"></a-box>
        
        
        <a-box position="5 1.25 2" 
               width="2" height="2.5" depth="1" 
               color="#b0abaf"></a-box>
        
        
        <a-box position="-6 1.25 -4" 
               width="2" height="2.5" depth="1" 
               color="#b0abaf"></a-box>
        
        
        <a-box position="5 1.25 -4" 
               width="2" height="2.5" depth="1" 
               color="#b0abaf"></a-box>
      </a-entity>
      
      <!-- Rodillos -->
      <a-entity id="sistemaRodillos" position="0 0 0">
        
        <a-cylinder position="-6 1.5 -1" 
                    radius="0.4" height="5" 
                    rotation="90 0 0" 
                    color="#4d4c4d"></a-cylinder>
        
        
        <a-cylinder position="-3.2 1.5 -1" 
                    radius="0.4" height="5" 
                    rotation="90 0 0" 
                    color="#4d4c4d"></a-cylinder>
        
        
        <a-cylinder position="-0.2 1.5 -1" 
                    radius="0.4" height="5" 
                    rotation="90 0 0" 
                    color="#4d4c4d"></a-cylinder>
        
        
        <a-cylinder position="2.7 1.5 -1" 
                    radius="0.4" height="5" 
                    rotation="90 0 0" 
                    color="#4d4c4d"></a-cylinder>
        
        
        <a-cylinder position="5 1.5 -1" 
                    radius="0.4" height="5" 
                    rotation="90 0 0" 
                    color="#4d4c4d"></a-cylinder>
      </a-entity>
      
      <!-- Banda -->
      <a-entity id="bandaTransportadora" position="0 0 0">
        
        <a-plane position="-0.4 2.02 -1" 
                 width="11" height="5" 
                 rotation="-90 0 0" 
                 color="#40b041"></a-plane>
      </a-entity>
      
      <!-- Esferas transportadaas -->
      <a-entity id="esferas" position="0 0 0">
        
        <a-sphere position="-4.5 2.76 -1.14" 
                  radius="0.8" 
                  color="#d34545"></a-sphere>
        
        
        <a-sphere position="-2.15 2.76 -1.13" 
                  radius="0.8" 
                  color="#d34545"></a-sphere>
        
        
        <a-sphere position="0.51 2.76 -1.11" 
                  radius="0.8" 
                  color="#d34545"></a-sphere>
        
        
        <a-sphere position="3.25 2.76 -1.11" 
                  radius="0.8" 
                  color="#d34545"></a-sphere>
      </a-entity>
      
      <!-- Base de los rodillos -->
      <a-entity id="baseEstructural" position="0 0 0">
        <a-box position="-0.43 1 -1.05" 
               width="11" height="0.3" depth="5" 
               color="#797779"></a-box>
      </a-entity>
      
      <!-- Entorno -->
      <a-entity id="entorno" position="0 0 0">
        
        <a-plane position="0 0 -2" 
                 width="20" height="20" 
                 rotation="-90 0 0" 
                 color="#2f3231"></a-plane>
        
        
        <a-sky color="#37646d"></a-sky>
      </a-entity>
      
      <!-- Iluminación -->
      <a-light type="ambient" color="#BBBBBB"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
      <a-entity camera="" position="0 3.82399 7.86656" wasd-controls="" rotation="-12.490479933851923 2.5210142985756296 0" look-controls="" aframe-injected=""></a-entity>
      
    </a-scene>
  </body>
</html>
